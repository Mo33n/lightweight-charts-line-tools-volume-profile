<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Fixed Range Profile — Example</title>
	<style>
		* { box-sizing: border-box; }
		body {
			margin: 0;
			font-family: system-ui, sans-serif;
			background: #131722;
			color: #d1d4dc;
			display: grid;
			grid-template-columns: 280px 1fr;
			grid-template-rows: 1fr auto;
			height: 100vh;
		}
		#sidebar {
			padding: 12px;
			border-right: 1px solid #2a2e39;
			overflow-y: auto;
			font-size: 13px;
		}
		#sidebar h2 { margin: 0 0 8px; font-size: 14px; }
		#sidebar section { margin-bottom: 16px; }
		label { display: block; margin: 6px 0 2px; color: #787b86; }
		select, input, button {
			width: 100%;
			padding: 6px 8px;
			background: #1e222d;
			border: 1px solid #363a45;
			color: #d1d4dc;
			border-radius: 4px;
		}
		button { cursor: pointer; margin-top: 6px; }
		button.primary { background: #2962ff; border-color: #2962ff; }
		#chart-wrap { position: relative; min-height: 0; }
		#chart { width: 100%; height: 100%; }
		#log {
			grid-column: 1 / -1;
			padding: 8px 12px;
			font-family: ui-monospace, monospace;
			font-size: 11px;
			border-top: 1px solid #2a2e39;
			max-height: 120px;
			overflow-y: auto;
		}
		.hint { color: #787b86; font-size: 11px; margin-top: 4px; }
	</style>
</head>
<body>
	<aside id="sidebar">
		<h2>Fixed Range Profile</h2>
		<p class="hint">Click <strong>Draw profile</strong>, then click-drag or two-click a time range on the chart. <strong>Double-click</strong> a profile to open the full properties editor.</p>

		<section>
			<label for="pipeline">Data pipeline</label>
			<select id="pipeline">
				<option value="ohlc-volume">OHLC volume (fallback)</option>
				<option value="trades-by-price">Trades by price (synthetic demo bars)</option>
			</select>
		</section>

		<section>
			<label for="displayMode">Display mode</label>
			<select id="displayMode">
				<option value="total">Total</option>
				<option value="split">Up / Down split</option>
				<option value="delta">Delta</option>
			</select>
		</section>

		<section>
			<label for="rowCount">Row count</label>
			<input id="rowCount" type="number" min="4" max="80" value="24" />
		</section>

		<section>
			<label for="maxWidth">Max bar width fraction</label>
			<input id="maxWidth" type="range" min="0.1" max="0.8" step="0.05" value="0.45" />
		</section>

		<section>
			<label for="valueAreaPct">Value area % <span id="valueAreaPctLabel">70</span></label>
			<input id="valueAreaPct" type="range" min="10" max="100" step="5" value="70" />
		</section>

		<section>
			<label><input id="showPoc" type="checkbox" checked /> Show POC</label>
			<label><input id="showVa" type="checkbox" checked /> Show value area</label>
			<label><input id="extendRight" type="checkbox" /> Extend right</label>
		</section>

		<section>
			<button class="primary" id="drawBtn">Draw profile</button>
			<button id="clearBtn">Clear all tools</button>
			<button id="exportBtn">Export JSON</button>
		</section>

		<section>
			<label>Custom metric demo</label>
			<p class="hint">Register a pipeline that sums <code>openInterest</code> from bar.features map (see console).</p>
			<button id="customBtn">Draw open-interest profile</button>
		</section>
	</aside>

	<div id="chart-wrap"><div id="chart"></div></div>
	<div id="log"></div>

	<script src="../node_modules/lightweight-charts/dist/lightweight-charts.standalone.development.js"></script>
	<script src="../node_modules/lightweight-charts-line-tools-core/dist/lightweight-charts-line-tools-core.umd.js"></script>
	<script src="../dist/lightweight-charts-line-tools-volume-profile.umd.js"></script>

	<script>
		const VP = LightweightChartsLineToolsVolumeProfile;
		const Core = LightweightChartsLineToolsCore;
		const LWC = LightweightCharts;

		VP.ensureBuiltinProfilePipelines();

		const logEl = document.getElementById('log');
		function log(msg) {
			const p = document.createElement('div');
			p.textContent = msg;
			logEl.prepend(p);
			console.log(msg);
		}

		// Synthetic OHLC + trades-by-price dataset (full objects kept for profile pipelines)
		let demoBars = [];
		function buildDemoBars() {
			const bars = [];
			let price = 100;
			for (let i = 0; i < 80; i++) {
				const t = 1704067200 + i * 3600;
				const open = price;
				const drift = (Math.random() - 0.48) * 2;
				const close = open + drift;
				const high = Math.max(open, close) + Math.random();
				const low = Math.min(open, close) - Math.random();
				price = close;
				const volume = 50 + Math.floor(Math.random() * 200);

				const tradesByPrice = {};
				const mid = Math.round(close * 2) / 2;
				tradesByPrice[mid] = [volume * 0.55, volume * 0.1];
				tradesByPrice[mid - 0.5] = [-volume * 0.35];

				bars.push({
					time: t,
					open, high, low, close, volume,
					tradesByPrice,
					features: {
						openInterest: {
							[String(mid)]: 1000 + i * 10,
							[String(mid - 0.5)]: 800 + i * 5,
							[String(mid + 0.5)]: 600 + i * 3,
						},
					},
				});
			}
			return bars;
		}

		demoBars = buildDemoBars();

		// LWC candlestick series may not return custom fields from series.data() — supply full bars here.
		VP.registerProfileBarSource((range) =>
			demoBars.filter((b) => b.time >= range.from && b.time <= range.to),
		);

		const chartEl = document.getElementById('chart');
		const chart = LWC.createChart(chartEl, {
			layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
			grid: { vertLines: { visible: false }, horzLines: { visible: false } },
			rightPriceScale: { borderColor: '#2a2e39' },
			timeScale: { borderColor: '#2a2e39' },
		});

		const series = chart.addSeries(LWC.CandlestickSeries, {
			upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
			wickUpColor: '#26a69a', wickDownColor: '#ef5350',
		});
		series.setData(demoBars.map(({ time, open, high, low, close }) => ({ time, open, high, low, close })));

		const lineTools = Core.createLineToolsPlugin(chart, series);
		lineTools.registerLineTool(VP.LINE_TOOL_FIXED_RANGE_PROFILE, VP.LineToolFixedRangeProfile);

		// Custom open-interest pipeline
		VP.registerProfilePipeline({
			id: 'open-interest',
			label: 'Open interest by price',
			extractor: VP.createMapFieldExtractor({ field: 'features.openInterest', metricId: 'oi' }),
			aggregator: VP.createSumBinnedAggregator(),
		});

		const oiTemplate = VP.mergeProfileTemplate(VP.DEFAULT_VOLUME_PROFILE_TEMPLATE, {
			id: 'oi-profile',
			label: 'Open Interest',
			metrics: [{ id: 'oi', label: 'OI', role: 'magnitude', color: '#ab47bc' }],
			metricBinding: { magnitudeMetricId: 'oi' },
			displayMode: 'total',
		});

		function currentTemplate() {
			return VP.mergeProfileTemplate(VP.DEFAULT_VOLUME_PROFILE_TEMPLATE, {
				displayMode: document.getElementById('displayMode').value,
				rowLayout: { mode: 'rowCount', value: Number(document.getElementById('rowCount').value) || 24 },
				histogram: {
					...VP.DEFAULT_VOLUME_PROFILE_TEMPLATE.histogram,
					maxWidthFraction: Number(document.getElementById('maxWidth').value),
				},
				levels: {
					...VP.DEFAULT_VOLUME_PROFILE_TEMPLATE.levels,
					valueAreaFraction: Number(document.getElementById('valueAreaPct').value) / 100,
					showPoc: document.getElementById('showPoc').checked,
					showValueArea: document.getElementById('showVa').checked,
				},
				range: {
					...VP.DEFAULT_VOLUME_PROFILE_TEMPLATE.range,
					extendRight: document.getElementById('extendRight').checked,
				},
			});
		}

		function applyTemplateToSelection() {
			const json = lineTools.getSelectedLineTools();
			if (!json || json === '[]') return;
			const tools = JSON.parse(json);
			for (const t of tools) {
				if (t.toolType === VP.LINE_TOOL_FIXED_RANGE_PROFILE) {
					lineTools.applyLineToolOptions({
						id: t.id,
						options: {
							fixedRangeProfile: {
								template: currentTemplate(),
								pipelineId: document.getElementById('pipeline').value,
							},
						},
					});
				}
			}
		}

		['displayMode', 'rowCount', 'maxWidth', 'valueAreaPct', 'showPoc', 'showVa', 'extendRight', 'pipeline'].forEach((id) => {
			const el = document.getElementById(id);
			el.addEventListener('change', applyTemplateToSelection);
			if (id === 'valueAreaPct') {
				el.addEventListener('input', () => {
					document.getElementById('valueAreaPctLabel').textContent = el.value;
					applyTemplateToSelection();
				});
			}
		});

		document.getElementById('drawBtn').addEventListener('click', () => {
			lineTools.addLineTool(VP.LINE_TOOL_FIXED_RANGE_PROFILE, [], {
				fixedRangeProfile: {
					template: currentTemplate(),
					pipelineId: document.getElementById('pipeline').value,
				},
			});
			log('Interactive draw mode — select start and end of range.');
		});

		document.getElementById('customBtn').addEventListener('click', () => {
			const from = demoBars[20].time;
			const to = demoBars[50].time;
			lineTools.addLineTool(VP.LINE_TOOL_FIXED_RANGE_PROFILE, [
				{ timestamp: from, price: demoBars[20].low },
				{ timestamp: to, price: demoBars[50].high },
			], {
				fixedRangeProfile: {
					template: oiTemplate,
					pipelineId: 'open-interest',
				},
			});
			log('Programmatic open-interest profile placed (bars 20–50).');
		});

		document.getElementById('clearBtn').addEventListener('click', () => {
			lineTools.removeAllLineTools();
			log('Cleared all tools.');
		});

		document.getElementById('exportBtn').addEventListener('click', () => {
			log(lineTools.exportLineTools());
		});

		lineTools.subscribeLineToolsAfterEdit((e) => {
			const snap = e.selectedLineTool?.options?.fixedRangeProfile?.snapshot;
			if (snap) {
				log(`Profile updated: ${snap.rowCount} rows, ${snap.barCount} bars` + (snap.warning ? ` — ${snap.warning}` : ''));
			}
		});

		const propsEditor = VP.attachProfilePropertiesEditor(lineTools, {
			getPipelines: () => VP.listProfilePipelines(),
			onApply: (id) => log(`Properties applied to profile ${id}`),
			onClose: () => log('Properties editor closed'),
		});

		new ResizeObserver(() => {
			chart.applyOptions({ width: chartEl.clientWidth, height: chartEl.clientHeight });
		}).observe(chartEl);

		// Pre-place a sample profile so the demo works immediately without drawing first.
		lineTools.addLineTool(VP.LINE_TOOL_FIXED_RANGE_PROFILE, [
			{ timestamp: demoBars[15].time, price: demoBars[15].low },
			{ timestamp: demoBars[45].time, price: demoBars[45].high },
		], {
			fixedRangeProfile: {
				template: currentTemplate(),
				pipelineId: 'ohlc-volume',
			},
		});
		log('Sample profile loaded (bars 15–45). Use Draw profile to add another.');
		log('Ready. Built-in pipelines: ohlc-volume, trades-by-price.');
		log('Double-click any profile to customize pipeline, colors, layout, POC/VA, and more.');
	</script>
</body>
</html>
